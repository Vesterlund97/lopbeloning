<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0b07">
<title>Galopp</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-512.png" sizes="512x512" type="image/png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Galopp">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0b07;
    --bg2:#141009;
    --card:#1b1610;
    --card2:#221b12;
    --line:#332a1e;
    --amber:#f5a623;
    --amber-soft:#ffc861;
    --foam:#f6e9cf;
    --green:#5ac47e;
    --red:#e0604f;
    --cyan:#4fc4d6;
    --purple:#b98cf0;
    --txt:#f3ecdf;
    --mut:#9a8e78;
    --mut2:#6f6552;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--txt);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{max-width:520px;margin:0 auto;min-height:100vh;padding:0 0 96px;position:relative;
    background:radial-gradient(120% 60% at 50% -10%, #241a0e 0%, var(--bg) 55%);}
  h1,h2,h3{font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px}
  .mono{font-family:'Spline Sans Mono',monospace;font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select{font-family:inherit}

  /* header */
  header{padding:26px 22px 14px;display:flex;align-items:baseline;justify-content:space-between}
  .brand{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:26px;text-transform:uppercase;letter-spacing:2.5px}
  .brand b{color:var(--amber)}
  .brand-sub{font-size:11px;color:var(--mut2);letter-spacing:2px;text-transform:uppercase;margin-top:2px}

  .view{padding:0 18px;display:none;animation:fade .25s ease}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  /* the tab / hero */
  .tab-card{background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--line);
    border-radius:22px;padding:22px;display:flex;gap:18px;align-items:center;position:relative;overflow:hidden}
  .glass-wrap{flex:0 0 84px;display:flex;flex-direction:column;align-items:center}
  .glass{width:70px;height:104px}
  .glass-label{font-size:10px;color:var(--mut2);text-transform:uppercase;letter-spacing:1.5px;margin-top:6px}
  .tab-main{flex:1;min-width:0}
  .tab-lead{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--mut)}
  .tab-num{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:60px;line-height:.9;margin:2px 0 0;color:var(--amber);overflow-wrap:anywhere;max-width:100%}
  .tab-num.debt{color:var(--red)}
  .tab-unit{font-size:15px;color:var(--mut);font-weight:600;font-family:'Inter'}
  .tab-note{font-size:12px;color:var(--mut);margin-top:8px;line-height:1.4}
  .tab-note b{color:var(--foam);font-weight:600}

  .drink-row{display:flex;gap:10px;margin-top:14px}
  .btn{border-radius:13px;padding:12px 14px;font-weight:600;font-size:14px;text-align:center;transition:transform .08s,filter .15s;border:1px solid transparent}
  .btn:active{transform:scale(.97)}
  .btn-amber{background:var(--amber);color:#241800;flex:1}
  .btn-ghost{background:var(--card);border-color:var(--line);color:var(--txt)}
  .btn-ghost:hover{border-color:var(--amber)}
  .btn:disabled{opacity:.4;cursor:not-allowed}

  /* week strip */
  .week{margin-top:16px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px 18px}
  .week-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .week-title{font-size:13px;font-weight:600;color:var(--foam)}
  .streak-pill{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:var(--amber);background:rgba(245,166,35,.12);border:1px solid rgba(245,166,35,.25);padding:5px 11px;border-radius:20px}
  .dots{display:flex;gap:8px}
  .dot{flex:1;height:8px;border-radius:5px;background:#2a2216}
  .dot.on{background:var(--green)}
  .week-need{font-size:12px;color:var(--mut);margin-top:11px}

  /* stat grid */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 16px}
  .stat .k{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;font-weight:600}
  .stat .v{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:30px;margin-top:3px;overflow-wrap:anywhere;max-width:100%}
  .stat{min-width:0}
  .stat .u{font-size:12px;color:var(--mut);font-weight:600;font-family:'Inter'}
  .c-cyan{color:var(--cyan)} .c-green{color:var(--green)} .c-purple{color:var(--purple)} .c-amber{color:var(--amber)} .c-red{color:var(--red)}

  .sec-title{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:18px;text-transform:uppercase;letter-spacing:1.5px;color:var(--mut);margin:26px 4px 12px}

  /* ledger */
  .ledger{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:6px 16px}
  .led-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px dashed var(--line);font-size:13px}
  .led-row:last-child{border-bottom:none}
  .led-row .l{color:var(--mut)}
  .led-row .r{font-weight:600;overflow-wrap:anywhere;text-align:right;max-width:60%}
  .led-row.tot .l{color:var(--foam);font-weight:600}
  .led-row.tot .r{font-size:16px}
  .pos{color:var(--green)} .neg{color:var(--red)}

  /* historik */
  .seg{display:flex;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:4px;gap:4px;margin-top:14px}
  .seg button{flex:1;padding:8px 0;border-radius:10px;font-size:13px;font-weight:600;color:var(--mut);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .seg button.active{background:var(--amber);color:#241800}
  .hk-bar{cursor:pointer}
  .hk-met{fill:var(--green)}
  .hk-missed{fill:var(--red)}
  .hk-pending{fill:var(--amber);opacity:.5}
  .hk-sel{stroke:var(--foam);stroke-width:1.5}
  .hk-grid{stroke:var(--line);stroke-width:.5;stroke-dasharray:2,2}
  .hk-gridlabel{font-size:7px;fill:var(--mut2);font-family:'Spline Sans Mono',monospace}
  .hk-vallabel{font-size:6.5px;fill:var(--mut);font-family:'Spline Sans Mono',monospace;text-anchor:middle}
  .hk-legend{display:flex;gap:16px;font-size:12px;color:var(--mut);margin-top:10px}
  .hk-legend i{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:5px;vertical-align:middle}
  .es-earn{fill:var(--green)}
  .es-spend{fill:var(--red)}
  .dot-sm{width:8px;height:8px;border-radius:50%;flex:0 0 auto;background:var(--red)}
  .dot-sm.on{background:var(--green)}
  .dot-sm.pending{background:var(--amber);opacity:.6}

  /* forms */
  .field{margin-bottom:15px}
  .field label{display:block;font-size:12px;color:var(--mut);font-weight:600;margin-bottom:6px;letter-spacing:.3px}
  .charcount{color:var(--mut2);font-weight:600;letter-spacing:0;text-transform:none}
  .field input,.field select{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:12px;
    padding:13px 14px;color:var(--txt);font-size:16px}
  .field input:focus,.field select:focus{outline:none;border-color:var(--amber)}
  .field .hint{font-size:11px;color:var(--mut2);margin-top:5px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  input[type="file"]{width:100%;color:var(--mut);font-size:13px}
  input[type="file"]::file-selector-button{background:var(--card);color:var(--txt);border:1px solid var(--line);
    border-radius:10px;padding:8px 12px;font-family:inherit;font-size:13px;font-weight:600;margin-right:10px;cursor:pointer}
  input[type="file"]::file-selector-button:hover{border-color:var(--amber)}
  .field textarea{width:100%;min-height:120px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:13px 14px;color:var(--txt);font-size:12px;font-family:'Spline Sans Mono',monospace;resize:vertical}
  .field textarea:focus{outline:none;border-color:var(--amber)}
  details{color:var(--mut);font-size:13px}
  details summary{cursor:pointer;color:var(--foam);font-weight:600;margin:14px 0 8px}

  /* run list */
  .run{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin-bottom:9px}
  .run .rd{font-size:12px;color:var(--mut);flex:0 0 74px}
  .run .rk{font-family:'Barlow Condensed';font-weight:700;font-size:22px}
  .run .rc{font-size:12px;color:var(--mut);margin-left:auto}
  .run .beer{color:var(--amber);font-weight:600;font-size:13px;flex:0 0 auto}
  .run .edit{color:var(--mut2);font-size:15px;padding:2px 6px;line-height:1}
  .run .edit:hover{color:var(--foam)}
  .run .del{color:var(--mut2);font-size:20px;padding:2px 6px;line-height:1}
  .run .del:hover{color:var(--red)}

  /* achievements */
  .ach{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 16px;margin-bottom:11px;position:relative;overflow:hidden}
  .ach.done{border-color:rgba(245,166,35,.45);background:linear-gradient(150deg,rgba(245,166,35,.10),var(--card))}
  .ach-top{display:flex;align-items:center;gap:10px}
  .ach-ico{font-size:22px;flex:0 0 auto}
  .ach-name{font-weight:600;font-size:15px;flex:1}
  .ach-times{font-size:12px;font-weight:700;color:var(--amber);background:rgba(245,166,35,.14);padding:2px 8px;border-radius:10px}
  .ach-edit{color:var(--mut2);font-size:15px;padding:2px 6px}
  .ach-edit:hover{color:var(--foam)}
  .ach-reward{font-size:13px;color:var(--amber-soft);margin:7px 0 10px;font-weight:500}
  .ach-cond{font-size:12px;color:var(--mut)}
  .bar{height:7px;background:#2a2216;border-radius:5px;overflow:hidden;margin-top:9px}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--amber),var(--amber-soft));border-radius:5px;transition:width .5s ease}
  .ach.done .bar>i{background:var(--green)}
  .ach-prog{font-size:11px;color:var(--mut2);margin-top:6px;display:flex;justify-content:space-between}
  .badge-done{position:absolute;top:12px;right:14px;font-size:11px;font-weight:700;color:var(--green);letter-spacing:1px}

  .empty{text-align:center;color:var(--mut2);font-size:14px;padding:34px 20px;border:1px dashed var(--line);border-radius:16px;line-height:1.5}

  /* nav */
  nav{position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;background:rgba(17,13,8,.92);
    backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;padding:8px 8px calc(8px + env(safe-area-inset-bottom))}
  nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;color:var(--mut2);font-size:10px;letter-spacing:.5px;text-transform:uppercase;font-weight:600}
  nav button svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.9}
  nav button.active{color:var(--amber)}

  /* modal */
  .lb-scrim{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:flex-end;justify-content:center;z-index:50}
  .lb-scrim.show{display:flex}
  .modal{background:var(--bg2);border:1px solid var(--line);border-top-left-radius:24px;border-top-right-radius:24px;
    width:100%;max-width:520px;padding:22px 20px calc(24px + env(safe-area-inset-bottom));max-height:88vh;overflow:auto;animation:up .28s ease}
  @keyframes up{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
  .modal h3{font-size:22px;text-transform:uppercase;letter-spacing:1px;margin-bottom:18px}
  .modal-actions{display:flex;gap:10px;margin-top:8px}
  .modal-actions .btn{flex:1}
  .danger{color:var(--red);font-size:13px;font-weight:600;text-align:center;width:100%;padding:12px;margin-top:4px}

  .setline{display:flex;justify-content:space-between;align-items:center;padding:15px 0;border-bottom:1px solid var(--line)}
  .setline:last-of-type{border-bottom:none}
  .setline .sl{font-size:14px}
  .setline .sd{font-size:12px;color:var(--mut2);margin-top:2px}
  .setline input{width:88px;text-align:right;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:9px 11px;color:var(--txt);font-size:15px}
  .setline input:focus{outline:none;border-color:var(--amber)}
  .dprofile{display:flex;align-items:center;gap:10px;padding:12px 6px;border-bottom:1px dashed var(--line);cursor:pointer;border-radius:10px}
  .dprofile:last-child{border-bottom:none}
  .dprofile.active{background:rgba(245,166,35,.08)}
  .dprofile .dp-check{color:var(--amber);font-size:15px;flex:0 0 16px;text-align:center;font-weight:700}
  .dprofile .dp-ico{font-size:20px;flex:0 0 auto}
  .dprofile .dp-label{font-weight:600;flex:1;min-width:0;overflow-wrap:anywhere}
  .dprofile .dp-kcal{font-size:12px;color:var(--mut);flex:0 0 auto}
  .dprofile .edit{color:var(--mut2);font-size:15px;padding:2px 6px}
  .dprofile .edit:hover{color:var(--foam)}
</style>
</head>
<body>
  <header>
    <div>
      <div class="brand">GAL<b>OPP</b></div>
      <div class="brand-sub">spring · tjäna · skål</div>
    </div>
  </header>

  <!-- ÖVERSIKT -->
  <section class="view active" id="v-oversikt"></section>
  <!-- LOGGA -->
  <section class="view" id="v-logga"></section>
  <!-- MÅL -->
  <section class="view" id="v-mal"></section>
  <!-- HISTORIK -->
  <section class="view" id="v-historik"></section>
  <!-- INSTÄLLNINGAR -->
  <section class="view" id="v-installningar"></section>
  <!-- OM -->
  <section class="view" id="v-om"></section>

  <nav>
    <button data-tab="oversikt" class="active">
      <svg viewBox="0 0 24 24"><path d="M3 12l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>Översikt</button>
    <button data-tab="logga">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Logga</button>
    <button data-tab="mal">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="5"/><path d="M8.5 12L7 21l5-3 5 3-1.5-9"/></svg>Mål</button>
    <button data-tab="historik">
      <svg viewBox="0 0 24 24"><path d="M5 21V13M12 21V7M19 21V16"/></svg>Historik</button>
    <button data-tab="installningar">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg>Inställn.</button>
  </nav>

  <div class="lb-scrim" id="lb-scrim"><div class="modal" id="modal"></div></div>

<script>
// ---------- storage (funkar i Claude-artifact via window.storage, och på GitHub Pages via localStorage) ----------
const KEY='lopbeloning_v1';
const store={
  async get(){
    if(window.storage){try{const r=await window.storage.get(KEY);return r?JSON.parse(r.value):null}catch(e){return null}}
    try{const v=localStorage.getItem(KEY);return v?JSON.parse(v):null}catch(e){return null}
  },
  async set(s){
    if(window.storage){try{await window.storage.set(KEY,JSON.stringify(s))}catch(e){}return}
    try{localStorage.setItem(KEY,JSON.stringify(s))}catch(e){}
  }
};

// Avstängd 2026-07-23: inget akut behov just nu, men kod/parselogik lämnas
// orörd nedan (bara UI-ingången gömd) eftersom det är billigare att dölja
// än att riva ut och bygga om senare om behovet återkommer.
const ENABLE_SAMSUNG_HEALTH=false;
const DEFAULT_TZ=Intl.DateTimeFormat().resolvedOptions().timeZone||'UTC';
const DEFAULT_DRINK_PROFILES=[
  {id:'ol',label:'öl',icon:'🍺',kcalPerUnit:250},
  {id:'vin',label:'vin',icon:'🍷',kcalPerUnit:150},
  {id:'grogg',label:'grogg',icon:'🥃',kcalPerUnit:100}
];
const DEFAULTS={
  // drinkProfiles/activeDrinkId medvetet INTE här — ensureDrinkProfiles() bygger
  // dem alltid färskt (både för nya installationer och vid migrering av gammal
  // data) så att ingen del av S någonsin delar array-referens med denna konstant.
  settings:{kcalPerBeer:250,needPerWeek:1,penaltyBeer:2,bankCap:3,unit:'öl',timezone:DEFAULT_TZ},
  runs:[],
  consumed:[],
  achievements:[
    {id:'a1',icon:'🍺',name:'Specialöl',cond:'run_km',threshold:5,reward:'En IPA istället för vardagsölen',repeatable:true,claimedCount:0},
    {id:'a2',icon:'🥃',name:'Whiskyglas',cond:'run_km',threshold:10,reward:'1 glas whisky',repeatable:false,claimedCount:0},
    {id:'a3',icon:'🔥',name:'Momentum',cond:'streak',threshold:3,reward:'Valfri premie du bestämmer',repeatable:false,claimedCount:0},
    {id:'a4',icon:'🏆',name:'Hundralappen',cond:'total_km',threshold:100,reward:'En riktigt fin flaska',repeatable:false,claimedCount:0}
  ]
};

let S=null;
let historikMetric='km'; // 'km'|'kcal'|'ol' — ren UI-state, sparas inte i S
const $=sel=>document.querySelector(sel);
const nf=(n,d=0)=>Number(n).toLocaleString('sv-SE',{minimumFractionDigits:d,maximumFractionDigits:d});
const uid=()=>'x'+Math.random().toString(36).slice(2,8);

const CONDS={
  run_km:{label:'Distans i ett pass',unit:'km',dec:1},
  run_kcal:{label:'Kalorier i ett pass',unit:'kcal',dec:0},
  streak:{label:'Streak',unit:'veckor i rad',dec:0},
  total_km:{label:'Total distans',unit:'km',dec:0},
  total_runs:{label:'Antal pass totalt',unit:'pass',dec:0},
  total_kcal:{label:'Totala kalorier',unit:'kcal',dec:0}
};

// ---------- vecko-matematik (måndag som veckostart) ----------
// OBS: toISOString() konverterar till UTC, vilket kan hoppa till fel kalenderdag
// beroende på tidszon. "Vilken dag är idag" avgörs istället explicit av
// S.settings.timezone (valbar i Inställningar), inte webbläsarens lokala zon.
function dateKey(d){
  const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function currentTz(){return (S&&S.settings&&S.settings.timezone)||DEFAULT_TZ}
function dateKeyInTz(d,tz){
  const parts=new Intl.DateTimeFormat('en-CA',{timeZone:tz,year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(d);
  const o={};parts.forEach(p=>o[p.type]=p.value);
  return `${o.year}-${o.month}-${o.day}`;
}
function todayKey(){return dateKeyInTz(new Date(),currentTz())}

// ---------- dryckesprofiler & consumed-migrering ----------
// consumed var tidigare ett enda globalt tal; är nu en lista datumstämplade
// händelser (samma mönster som runs) så Historik kan visa spenderat per vecka.
function normalizeConsumed(raw){
  if(Array.isArray(raw))return raw.filter(x=>x&&typeof x.date==='string');
  if(typeof raw==='number'&&raw>0)return Array.from({length:Math.round(raw)},()=>({id:uid(),date:todayKey()}));
  return[];
}
function activeDrink(){
  const list=S.settings.drinkProfiles&&S.settings.drinkProfiles.length?S.settings.drinkProfiles:DEFAULT_DRINK_PROFILES;
  return list.find(d=>d.id===S.settings.activeDrinkId)||list[0];
}
function syncActiveDrink(){
  const d=activeDrink();
  S.settings.unit=d.label;
  S.settings.kcalPerBeer=d.kcalPerUnit;
}
// Skapar dryckesprofiler om äldre sparad data saknar dem — bevarar användarens
// ev. redan anpassade unit/kcalPerBeer som den nya "öl"-profilens värden,
// istället för att tysta återställa till hårdkodade defaults.
function ensureDrinkProfiles(){
  if(!Array.isArray(S.settings.drinkProfiles)||!S.settings.drinkProfiles.length){
    S.settings.drinkProfiles=DEFAULT_DRINK_PROFILES.map(d=>d.id==='ol'
      ?{...d,label:S.settings.unit||d.label,kcalPerUnit:S.settings.kcalPerBeer||d.kcalPerUnit}
      :{...d});
    S.settings.activeDrinkId='ol';
  }
  if(!S.settings.drinkProfiles.some(d=>d.id===S.settings.activeDrinkId)){
    S.settings.activeDrinkId=S.settings.drinkProfiles[0].id;
  }
  syncActiveDrink();
}
function consumedInWeek(wk){return S.consumed.filter(c=>mondayKey(c.date)===wk).length}
// Äldre sparad data saknar claimedCount på mål — default till 0 (inget hämtat än).
function ensureAchievementClaims(){
  S.achievements.forEach(a=>{if(typeof a.claimedCount!=='number')a.claimedCount=0});
}

function mondayKey(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  const day=(d.getDay()+6)%7;
  d.setDate(d.getDate()-day);
  return dateKey(d);
}
function isoWeekNum(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  const day=(d.getDay()+6)%7;d.setDate(d.getDate()-day+3);
  const firstThu=new Date(d.getFullYear(),0,4);
  const fDay=(firstThu.getDay()+6)%7;firstThu.setDate(firstThu.getDate()-fDay+3);
  return 1+Math.round((d-firstThu)/(7*864e5));
}
function weekSpanLabel(wk){
  const start=new Date(wk+'T00:00:00');const end=new Date(start);end.setDate(end.getDate()+6);
  const fmt=d=>d.toLocaleDateString('sv-SE',{day:'numeric',month:'short'});
  return start.getMonth()===end.getMonth() ? `${start.getDate()}–${fmt(end)}` : `${fmt(start)}–${fmt(end)}`;
}
function weekList(){ // alla veckonycklar från första passet till denna vecka
  if(!S.runs.length)return[];
  const nowKey=mondayKey(todayKey());
  const first=S.runs.map(r=>mondayKey(r.date)).sort()[0];
  const out=[];let cur=new Date(first+'T00:00:00');const end=new Date(nowKey+'T00:00:00');
  while(cur<=end){out.push(dateKey(cur));cur.setDate(cur.getDate()+7)}
  return out;
}
function runsInWeek(wk){return S.runs.filter(r=>mondayKey(r.date)===wk).length}

// Simulerar öl-ekonomin i kronologisk ordning (intjäning, drickande, straff) så att
// "överskott utöver cap" blir en ren, växande "titt-vad-du-sprungit-in"-summa som
// ALDRIG dräneras av att man dricker — bara det som faktiskt fick plats i den
// cap-begränsade bucketen när det tjänades in är spenderbart. Drickande/straff drar
// alltid direkt från bucketen (kan gå i skuld där), aldrig från överskottet. Ordningen
// spelar roll (därför en tidslinje, inte bara en summa) — annars kan man inte skilja
// "intjänat innan cap nåddes" från "intjänat efter", vilket är precis vad som avgör
// om det landar i bucketen eller överskottet.
function simulateBucket(weeks,nowKey,need){
  const cap=S.settings.bankCap;
  const events=[];
  S.runs.forEach(r=>events.push({date:r.date,amt:(+r.kcal||0)/S.settings.kcalPerBeer}));
  S.consumed.forEach(c=>events.push({date:c.date,amt:-1}));
  weeks.forEach(wk=>{
    if(wk!==nowKey&&runsInWeek(wk)<need){
      const sunday=new Date(wk+'T00:00:00');sunday.setDate(sunday.getDate()+6);
      events.push({date:dateKey(sunday),amt:-S.settings.penaltyBeer});
    }
  });
  events.sort((a,b)=>a.date.localeCompare(b.date));
  let bucket=0,surplus=0;
  for(const e of events){
    if(e.amt>0&&cap>0){
      const room=Math.max(0,cap-bucket);
      const toBucket=Math.min(e.amt,room);
      bucket+=toBucket;surplus+=(e.amt-toBucket);
    }else{
      bucket+=e.amt;
    }
  }
  return{bucket,surplus};
}
function derive(){
  const need=S.settings.needPerWeek;
  const totalKcal=S.runs.reduce((a,r)=>a+(+r.kcal||0),0);
  const totalKm=S.runs.reduce((a,r)=>a+(+r.km||0),0);
  const totalRuns=S.runs.length;
  const weeks=weekList();
  const nowKey=mondayKey(todayKey());
  const missed=weeks.filter(w=>w!==nowKey&&runsInWeek(w)<need).length;
  // streak: från nuvarande vecka bakåt
  let streak=0;
  for(let i=weeks.length-1;i>=0;i--){
    const w=weeks[i];const n=runsInWeek(w);
    if(w===nowKey){ if(n>=need)streak++; }
    else { if(n>=need)streak++; else break; }
  }
  const earned=totalKcal/S.settings.kcalPerBeer;
  const penalty=missed*S.settings.penaltyBeer;
  const cap=S.settings.bankCap;
  const{bucket,surplus}=simulateBucket(weeks,nowKey,need);
  const capped=bucket; // "capped" är namnet all rendering redan förväntar sig
  const thisWeekRuns=runsInWeek(nowKey);
  return{totalKcal,totalKm,totalRuns,missed,streak,earned,penalty,capped,surplus,cap,thisWeekRuns,need,nowKey,weeks};
}

// ---------- achievement-progress ----------
function achState(a,D){
  const t=+a.threshold;let cur=0,times=0;
  if(a.cond==='run_km'){cur=Math.max(0,...S.runs.map(r=>+r.km||0));times=S.runs.filter(r=>(+r.km||0)>=t).length}
  else if(a.cond==='run_kcal'){cur=Math.max(0,...S.runs.map(r=>+r.kcal||0));times=S.runs.filter(r=>(+r.kcal||0)>=t).length}
  else if(a.cond==='streak'){cur=D.streak}
  else if(a.cond==='total_km'){cur=D.totalKm}
  else if(a.cond==='total_runs'){cur=D.totalRuns}
  else if(a.cond==='total_kcal'){cur=D.totalKcal}
  const done=cur>=t;
  const claimedCount=a.claimedCount||0;
  // Repeterbara mål: "unclaimed" är hur många intjänade omgångar som väntar på
  // att hämtas — när allt är hämtat återgår kortet till "pågående" tills nästa
  // kvalificerande pass. Icke-repeterbara: bara 0 eller 1, rent kosmetiskt
  // (målet kan ändå inte låsas upp igen).
  const unclaimed=a.repeatable?Math.max(0,times-claimedCount):(done&&claimedCount<1?1:0);
  // För repeterbara distans-/kaloriemål: cur är "bästa passet någonsin" och
  // nollställs annars aldrig. När allt intjänat redan är hämtat ska förloppet
  // visa 0/tröskel igen (väntar på ett NYTT kvalificerande pass) istället för
  // att fortsätta stå kvar på 100 % från ett pass som redan är inhämtat.
  const resetProgress=a.repeatable&&(a.cond==='run_km'||a.cond==='run_kcal')&&unclaimed===0;
  const dCur=resetProgress?0:cur,dDone=resetProgress?false:done;
  return{cur:dCur,done:dDone,times,claimedCount,unclaimed,pct:Math.min(1,t?dCur/t:0)};
}

// ---------- historik: veckoaggregering ----------
function weekAgg(wk){
  const rows=S.runs.filter(r=>mondayKey(r.date)===wk);
  const km=rows.reduce((a,r)=>a+(+r.km||0),0);
  const kcal=rows.reduce((a,r)=>a+(+r.kcal||0),0);
  const runs=rows.length;
  const beers=kcal/S.settings.kcalPerBeer;
  const met=runs>=S.settings.needPerWeek;
  const isCurrent=wk===mondayKey(todayKey());
  const status=met?'met':(isCurrent?'pending':'missed');
  return{wk,km,kcal,runs,beers,met,isCurrent,status};
}
function historyWeeks(){return weekList().map(weekAgg).reverse()} // nyast-först
function recentWeeks(n=12){return historyWeeks().slice(0,n).reverse()} // kronologisk, för diagrammet
function metricValue(w,metric){return metric==='kcal'?w.kcal:metric==='ol'?w.beers:w.km}

function longestStreakEver(){
  const weeks=weekList();const nowKey=mondayKey(todayKey());
  let best=0,cur=0;
  for(const w of weeks){
    const met=runsInWeek(w)>=S.settings.needPerWeek;
    if(w===nowKey){if(met){cur++;best=Math.max(best,cur)}}
    else if(met){cur++;best=Math.max(best,cur)}
    else{cur=0}
  }
  return best;
}

// ---------- import (Samsung Health-export m.fl.) ----------
// Samsung Health har inget öppet automatiskt synk-API för webbappar. Detta
// tolkar filen från "Samsung Health → ⋮ → Inställningar → Ladda ner
// personuppgifter" (kolumner start_time/distance/calorie/exercise_type,
// se Samsungs HealthConstants.Exercise), samt enklare CSV/JSON-export
// från andra appar med igenkännbara kolumnnamn.
function splitCSVLine(line){
  const out=[];let cur='';let q=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(q){
      if(c==='"'){if(line[i+1]==='"'){cur+='"';i++}else q=false}
      else cur+=c;
    }else{
      if(c==='"')q=true;
      else if(c===','){out.push(cur);cur=''}
      else cur+=c;
    }
  }
  out.push(cur);
  return out;
}
function toDateFromRaw(raw){
  if(typeof raw==='number'||/^\d+$/.test(raw)){
    const n=+raw;
    return new Date(n>1e12?n:n*1000); // epok i ms eller sekunder
  }
  return new Date(raw);
}
function parseImportCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim().length);
  if(lines.length<2)return[];
  const headers=splitCSVLine(lines[0]).map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
  const find=(...names)=>{
    for(const n of names){const i=headers.indexOf(n);if(i>=0)return i}
    for(const n of names){const i=headers.findIndex(h=>h.includes(n));if(i>=0)return i}
    return -1;
  };
  const dateI=find('start_time','starttime','date','datum','time');
  const kmI=find('distance','distans','km');
  const kcalI=find('calorie','calories','kcal','kalorier');
  const typeI=find('exercise_type','type');
  if(dateI<0||kmI<0||kcalI<0)return[];
  const tz=currentTz();const out=[];
  for(let i=1;i<lines.length;i++){
    const cols=splitCSVLine(lines[i]);
    if(cols.length<headers.length)continue;
    let km=parseFloat(cols[kmI]);const kcal=parseFloat(cols[kcalI]);
    if(!(km>0)||!(kcal>0))continue;
    if(km>50)km=km/1000; // meter -> km
    const d=toDateFromRaw(cols[dateI].trim());
    if(isNaN(d))continue;
    out.push({date:dateKeyInTz(d,tz),km:+km.toFixed(2),kcal:Math.round(kcal),type:typeI>=0?cols[typeI]:''});
  }
  return out;
}
function parseImportJSON(data){
  let arr=Array.isArray(data)?data:null;
  if(!arr){for(const k in data){if(Array.isArray(data[k])){arr=data[k];break}}}
  if(!arr)return[];
  const tz=currentTz();const out=[];
  for(const rec of arr){
    if(!rec||typeof rec!=='object')continue;
    const lower={};for(const k in rec)lower[k.toLowerCase()]=rec[k];
    const dRaw=lower.start_time??lower.starttime??lower.date??lower.create_time;
    const kmRaw=lower.distance??lower.distance_km??lower.km;
    const kcalRaw=lower.calorie??lower.calories??lower.kcal;
    if(dRaw==null||kmRaw==null||kcalRaw==null)continue;
    let km=+kmRaw;const kcal=+kcalRaw;
    if(!(km>0)||!(kcal>0))continue;
    if(km>50)km=km/1000;
    const d=toDateFromRaw(dRaw);
    if(isNaN(d))continue;
    out.push({date:dateKeyInTz(d,tz),km:+km.toFixed(2),kcal:Math.round(kcal),type:lower.exercise_type??''});
  }
  return out;
}
function parseImportText(text){
  const t=text.trim();
  if(!t)return[];
  if(t[0]==='['||t[0]==='{'){
    try{return parseImportJSON(JSON.parse(t))}catch(e){return[]}
  }
  return parseImportCSV(t);
}

// ---------- backup: export/import av all appdata ----------
// Detta är HELA appens state (settings+runs+consumed+achievements), inte att
// förväxla med löppass-importen ovan som bara lägger till rader i S.runs.
const BACKUP_VERSION=2;
// Migrationskedja: nyckel = version man migrerar FRÅN; värde = fn(parsed)->parsed@version+1.
// v1: consumed var ett tal, ingen dryckesprofil fanns. Ingen datatransformation
// behövs här — applyBackupImport() kör normalizeConsumed()/ensureDrinkProfiles()
// på ALL inläst data (både från boot och från backup-import) via samma delade
// hjälpfunktioner, så det räcker att bara märka om versionen här.
// Rör aldrig tidigare steg när BACKUP_VERSION höjs igen — lägg bara till nästa.
const BACKUP_MIGRATIONS={
  1:parsed=>({app:parsed.app,version:2,exportedAt:parsed.exportedAt,data:parsed.data})
};
function migrateBackup(parsed){
  let cur=parsed;
  while(cur.version<BACKUP_VERSION){
    const step=BACKUP_MIGRATIONS[cur.version];
    if(!step)throw new Error('no migration path from version '+cur.version);
    cur=step(cur);
  }
  if(cur.version!==BACKUP_VERSION)throw new Error('unsupported version '+cur.version);
  return cur;
}
function validateAndMigrateBackup(text){
  let parsed;
  try{parsed=JSON.parse(text)}catch(e){return{ok:false,code:'unreadable'}}
  if(!parsed||typeof parsed!=='object')return{ok:false,code:'unreadable'};
  if(parsed.app!=='lopbeloning')return{ok:false,code:'wrongapp'};
  if(typeof parsed.version!=='number')return{ok:false,code:'unreadable'};
  let migrated;
  try{migrated=migrateBackup(parsed)}catch(e){return{ok:false,code:'wrongapp'}}
  const d=migrated.data;
  if(!d||typeof d!=='object'||!Array.isArray(d.runs)||!Array.isArray(d.achievements)||typeof d.settings!=='object')
    return{ok:false,code:'unreadable'};
  return{ok:true,migrated};
}
function backupPayload(){
  return{app:'lopbeloning',version:BACKUP_VERSION,exportedAt:new Date().toISOString(),
    data:{settings:S.settings,runs:S.runs,consumed:S.consumed,achievements:S.achievements}};
}
function backupFilename(){return `lopbeloning-backup-${todayKey()}.json`}

}

function wineGlassSvg(p){
  const bowlTop=12,bowlBottom=48; // liquid bounds within the bowl only, not stem/base
  const top=bowlBottom-(bowlBottom-bowlTop)*p;
  return `<svg class="glass" viewBox="0 0 70 104">
    <defs><linearGradient id="wine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c9506e"/><stop offset="1" stop-color="#7a1f36"/></linearGradient></defs>
    <clipPath id="wine-cup"><path d="M15 12 C15 12 11 38 19 46 C24 51 46 51 51 46 C59 38 55 12 55 12 Z"/></clipPath>
    <g clip-path="url(#wine-cup)"><rect x="10" y="${top}" width="50" height="60" fill="url(#wine)"/></g>
    <path d="M15 12 C15 12 11 38 19 46 C24 51 46 51 51 46 C59 38 55 12 55 12" fill="none" stroke="#4a3d28" stroke-width="2.5"/>
    <line x1="35" y1="49" x2="35" y2="86" stroke="#4a3d28" stroke-width="2.5"/>
    <ellipse cx="35" cy="89" rx="15" ry="4" fill="none" stroke="#4a3d28" stroke-width="2.5"/>
  </svg>`;
}
function rocksGlassSvg(p){
  const cupTop=42,cupBottom=97;
  const top=cupBottom-(cupBottom-cupTop)*p;
  return `<svg class="glass" viewBox="0 0 70 104">
    <defs><linearGradient id="rocks" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d9a441"/><stop offset="1" stop-color="#8a5a1e"/></linearGradient></defs>
    <clipPath id="rocks-cup"><path d="M16 42 h38 l-2 50 a5 5 0 0 1 -5 5 h-26 a5 5 0 0 1 -5 -5 z"/></clipPath>
    <g clip-path="url(#rocks-cup)"><rect x="12" y="${top}" width="46" height="60" fill="url(#rocks)"/></g>
    <path d="M16 42 h38 l-2 50 a5 5 0 0 1 -5 5 h-26 a5 5 0 0 1 -5 -5 z" fill="none" stroke="#4a3d28" stroke-width="2.5"/>
  </svg>`;
}
// Ikonen på den aktiva dryckesprofilen styr vilket glas som visas — 🍷 blir
// ett vinglas, 🥃 en lowball-tumbler, allt annat (🍺 + egna ikoner) förblir
// den vanliga ölglas-siluetten som standard.
function drinkGlass(fillPct,profile){
  const p=Math.max(0,Math.min(1,fillPct));
  const icon=(profile&&profile.icon)||'🍺';
  if(icon==='🍷')return wineGlassSvg(p);
  if(icon==='🥃')return rocksGlassSvg(p);
  return beerGlassSvg(p);
}

function renderOversikt(){
  const D=derive();const u=esc(S.settings.unit);
  const inDebt=D.capped<0;
  const drinkable=Math.max(0,Math.floor(D.capped));
  const fill=Math.min(1,D.capped); // glaset ska se fullt ut redan när man har råd med minst 1, inte skalat mot cap
  const saldoLabel=esc(S.settings.unit.charAt(0).toUpperCase()+S.settings.unit.slice(1))+'-saldo';
  const dots=Array.from({length:D.need},(_,i)=>`<div class="dot ${i<D.thisWeekRuns?'on':''}"></div>`).join('');
  const capNote=D.cap>0&&D.surplus>0?`Du har sprungit in <b>${nf(D.surplus,1)} ${u}</b> utöver cap (${nf(D.cap,1)}) — spring inte för att spara, spring för att springa.`:'';
  let note;
  if(inDebt) note=`Du ligger <b>${nf(Math.abs(D.capped),1)} ${u}</b> back. Spring in skulden innan nästa helgöl är betald.`;
  else if(drinkable>0) note=`Du har råd med <b>${drinkable} ${u}</b> just nu. ${capNote}`;
  else note=`Nästan där — spring en runda till så är första ${u}en betald.`;

  $('#v-oversikt').innerHTML=`
    <div class="tab-card">
      <div class="glass-wrap">${drinkGlass(fill,activeDrink())}<div class="glass-label">notan</div></div>
      <div class="tab-main">
        <div class="tab-lead">${saldoLabel}</div>
        <div class="tab-num ${inDebt?'debt':''}">${nf(D.capped,1)}<span class="tab-unit"> ${u}</span></div>
        <div class="tab-note">${note}</div>
      </div>
    </div>

    <div class="drink-row">
      <button class="btn btn-amber" id="drink" ${drinkable<=0?'disabled':''}>Drick 1 ${u}</button>
      <button class="btn btn-ghost" id="quicklog">+ Logga pass</button>
    </div>

    <div class="week">
      <div class="week-top">
        <div class="week-title">Denna vecka</div>
        <div class="streak-pill">🔥 ${D.streak} v streak</div>
      </div>
      <div class="dots">${dots}</div>
      <div class="week-need">${D.thisWeekRuns>=D.need
        ? `Klart — helgölen är upplåst.`
        : `${D.thisWeekRuns}/${D.need} pass. Kör ${D.need-D.thisWeekRuns} till så slipper du <b style="color:var(--red)">–${nf(S.settings.penaltyBeer,0)} ${u}</b>.`}</div>
    </div>

    <div class="grid">
      <div class="stat"><div class="k c-cyan">Total distans</div><div class="v c-cyan">${nf(D.totalKm,1)}<span class="u"> km</span></div></div>
      <div class="stat"><div class="k c-purple">Kalorier</div><div class="v c-purple">${nf(D.totalKcal,0)}<span class="u"> kcal</span></div></div>
      <div class="stat"><div class="k c-green">Antal pass</div><div class="v c-green">${D.totalRuns}</div></div>
      <div class="stat"><div class="k c-amber">Intjänat</div><div class="v c-amber">${nf(D.earned,1)}<span class="u"> ${u}</span></div></div>
    </div>

    <div class="sec-title">Notan i detalj</div>
    <div class="ledger">
      <div class="led-row"><span class="l">Intjänat (${nf(D.totalKcal,0)} kcal ÷ ${S.settings.kcalPerBeer})</span><span class="r pos">+${nf(D.earned,1)}</span></div>
      <div class="led-row"><span class="l">Druckna ${u}</span><span class="r ${S.consumed.length>0?'neg':''}">${S.consumed.length>0?'−':''}${nf(S.consumed.length,1)}</span></div>
      <div class="led-row"><span class="l">Missade veckor (${D.missed} × ${nf(S.settings.penaltyBeer,0)})</span><span class="r ${D.penalty>0?'neg':''}">${D.penalty>0?'−':''}${nf(D.penalty,1)}</span></div>
      ${D.surplus>0?`<div class="led-row"><span class="l">Överskott utöver cap (sparas ej)</span><span class="r" style="color:var(--amber)">−${nf(D.surplus,1)}</span></div>`:''}
      <div class="led-row tot"><span class="l">Saldo</span><span class="r ${inDebt?'neg':'pos'}">${nf(D.capped,1)} ${u}</span></div>
    </div>
  `;
  $('#drink').onclick=async()=>{S.consumed.push({id:uid(),date:todayKey()});await save();renderOversikt()};

function renderLogga(){
  const u=esc(S.settings.unit);const today=todayKey();
  const runs=[...S.runs].sort((a,b)=>b.date.localeCompare(a.date));
  const rows=runs.length?runs.map(r=>{
    const beer=(+r.kcal||0)/S.settings.kcalPerBeer;
    return `<div class="run">
      <span class="rd">${new Date(r.date+'T00:00:00').toLocaleDateString('sv-SE',{day:'numeric',month:'short'})}</span>
      <span class="rk">${nf(r.km,2)}<span class="u" style="font-size:12px;color:var(--mut)"> km</span></span>
      <span class="rc">${nf(r.kcal,0)} kcal</span>
      <span class="beer">${nf(beer,1)} ${u}</span>
      <button class="edit" data-edit-run="${r.id}">✎</button>
      <button class="del" data-del="${r.id}">×</button>
    </div>`}).join(''):`<div class="empty">Inga pass loggade än.<br>Lägg in din första runda ovan.</div>`;

  $('#v-logga').innerHTML=`
    <div class="sec-title">Logga ett pass</div>
    <div class="tab-card" style="display:block;padding:18px">
      <div class="field"><label>Datum</label><input type="date" id="f-date" value="${today}" max="${today}"></div>
      <div class="two">
        <div class="field"><label>Distans (km)</label><input type="number" id="f-km" inputmode="decimal" step="0.01" placeholder="4,01"></div>
        <div class="field"><label>Kalorier (kcal)</label><input type="number" id="f-kcal" inputmode="numeric" placeholder="414"></div>
      </div>
      <button class="btn btn-amber" id="f-save" style="width:100%">Spara pass</button>
    </div>
    ${ENABLE_SAMSUNG_HEALTH?'<button class="btn btn-ghost" id="import-btn" style="width:100%;margin-top:10px">⇩ Importera pass (Samsung Health m.fl.)</button>':''}
    <div class="sec-title">Loggade pass</div>
    ${rows}
  `;
  $('#f-save').onclick=async()=>{
    const km=parseFloat(($('#f-km').value||'').replace(',','.'));
    const kcal=parseFloat(($('#f-kcal').value||'').replace(',','.'));
    const date=$('#f-date').value;
    if(!date||isNaN(km)||isNaN(kcal)||km<=0){$('#f-km').style.borderColor=isNaN(km)?'var(--red)':'';$('#f-kcal').style.borderColor=isNaN(kcal)?'var(--red)':'';return}
    S.runs.push({id:uid(),date,km,kcal});await save();
    go('oversikt');
  };
  document.querySelectorAll('[data-del]').forEach(b=>b.onclick=async()=>{
    S.runs=S.runs.filter(r=>r.id!==b.dataset.del);await save();renderLogga();
  });
  document.querySelectorAll('[data-edit-run]').forEach(b=>b.onclick=()=>editRun(b.dataset.editRun));
  if(ENABLE_SAMSUNG_HEALTH)$('#import-btn').onclick=openImportModal;
}

function editRun(id){
  const r=S.runs.find(x=>x.id===id);if(!r)return;
  const today=todayKey();
  openModal(`
    <h3>Redigera pass</h3>
    <div class="field"><label>Datum</label><input type="date" id="e-date" value="${r.date}" max="${today}"></div>
    <div class="two">
      <div class="field"><label>Distans (km)</label><input type="number" id="e-km" inputmode="decimal" step="0.01" value="${r.km}"></div>
      <div class="field"><label>Kalorier (kcal)</label><input type="number" id="e-kcal" inputmode="numeric" value="${r.kcal}"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Avbryt</button>
      <button class="btn btn-amber" id="e-save">Spara</button>
    </div>
    <button class="danger" id="e-del">Ta bort pass</button>
  `);
  $('#e-save').onclick=async()=>{
    const km=parseFloat(($('#e-km').value||'').replace(',','.'));
    const kcal=parseFloat(($('#e-kcal').value||'').replace(',','.'));
    const date=$('#e-date').value;
    if(!date||isNaN(km)||isNaN(kcal)||km<=0){$('#e-km').style.borderColor=isNaN(km)?'var(--red)':'';$('#e-kcal').style.borderColor=isNaN(kcal)?'var(--red)':'';return}
    r.date=date;r.km=km;r.kcal=kcal;
    await save();closeModal();renderLogga();
  };
  $('#e-del').onclick=async()=>{
    S.runs=S.runs.filter(x=>x.id!==id);await save();closeModal();renderLogga();
  };
}

function renderMal(){
  const D=derive();const u=S.settings.unit;
  const cards=S.achievements.map(a=>{
    const st=achState(a,D);const c=CONDS[a.cond];
    // Repeterbara mål: kortet räknas som "klart" bara medan det finns ohämtade
    // omgångar — när allt är hämtat återgår det till pågående tills nästa
    // kvalificerande pass. Icke-repeterbara förblir klara permanent, men
    // badgen växlar UPPLÅST → HÄMTAD (rent kosmetiskt, kan ändå inte låsas upp igen).
    const cardDone=a.repeatable?st.unclaimed>0:st.done;
    const badge=!cardDone?'':(st.unclaimed>0?'<span class="badge-done">UPPLÅST</span>':'<span class="badge-done" style="color:var(--mut)">HÄMTAD</span>');
    return `<div class="ach ${cardDone?'done':''}">
      ${badge}
      <div class="ach-top">
        <span class="ach-ico">${a.icon||'🎯'}</span>
        <span class="ach-name">${esc(a.name)}</span>
        ${a.repeatable&&st.unclaimed>0?`<span class="ach-times">×${st.unclaimed}</span>`:''}
        <button class="ach-edit" data-edit="${a.id}">✎</button>
      </div>
      <div class="ach-reward">🎁 ${esc(a.reward)}</div>
      <div class="ach-cond">${c.label} ≥ ${nf(a.threshold,c.dec)} ${c.unit}${a.repeatable?' · repeterbart':''}</div>
      <div class="bar"><i style="width:${(st.pct*100).toFixed(0)}%"></i></div>
      <div class="ach-prog"><span>${nf(st.cur,c.dec)} / ${nf(a.threshold,c.dec)} ${c.unit}</span><span>${(st.pct*100).toFixed(0)}%</span></div>
      ${st.unclaimed>0?`<button class="btn btn-amber ach-claim" data-claim="${a.id}" style="width:100%;margin-top:10px">Hämta belöning${a.repeatable?` (×${st.unclaimed} kvar)`:''}</button>`:''}
    </div>`}).join('');
  $('#v-mal').innerHTML=`
    <div class="sec-title">Dina mål & belöningar</div>
    ${S.achievements.length?cards:'<div class="empty">Inga mål än.<br>Skapa ditt första nedan.</div>'}
    <button class="btn btn-ghost" id="add-ach" style="width:100%;margin-top:6px">+ Nytt mål</button>
    <div class="empty" style="margin-top:16px;border:none;color:var(--mut2);font-size:12px">
      Mål låser upp sig själva när ett pass eller din totala statistik når tröskeln.
    </div>
  `;
  $('#add-ach').onclick=()=>editAch(null);
  document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>editAch(b.dataset.edit));
  document.querySelectorAll('[data-claim]').forEach(b=>b.onclick=async()=>{
    const a=S.achievements.find(x=>x.id===b.dataset.claim);if(!a)return;
    a.claimedCount=(a.claimedCount||0)+1;
    await save();renderMal();
  });
}

function renderHistorik(){
  if(!S.runs.length){
    $('#v-historik').innerHTML=`<div class="sec-title">Historik</div>
      <div class="empty">Inga pass loggade än.<br>Logga ditt första pass i fliken Logga för att se din historik här.</div>`;
    return;
  }
  const D=derive();
  const bars=recentWeeks(12);
  const list=historyWeeks().slice(0,12);
  const u=S.settings.unit;
  const dec=historikMetric==='kcal'?0:1;
  const unitLabel=historikMetric==='kcal'?'kcal':historikMetric==='ol'?u:'km'; // rå text, för .textContent
  const unitLabelHtml=historikMetric==='ol'?esc(u):unitLabel; // escapad variant för innerHTML (SVG <title>)

  const n=bars.length,gap=4,chartTop=18,baseline=110,chartH=baseline-chartTop;
  const barW=(300-gap*(n-1))/n;
  const maxVal=Math.max(1,...bars.map(w=>metricValue(w,historikMetric)));
  const grid=(max,dec2)=>[0,.5,1].map(f=>{
    const y=baseline-chartH*f;
    return `<line x1="0" y1="${y.toFixed(1)}" x2="300" y2="${y.toFixed(1)}" class="hk-grid"/><text x="2" y="${(y-2).toFixed(1)}" class="hk-gridlabel">${nf(max*f,dec2)}</text>`;
  }).join('');
  const rects=bars.map((w,i)=>{
    const val=metricValue(w,historikMetric);
    const h=Math.max(3,chartH*(val/maxVal)),y=baseline-h,x=i*(barW+gap); // min-höjd så en 0-veckas stapel förblir synlig och tryckbar
    const cls=w.status==='met'?'hk-met':w.status==='missed'?'hk-missed':'hk-pending';
    const labelY=Math.max(9,y-3);
    return `<rect class="hk-bar ${cls}" data-i="${i}" x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${h.toFixed(1)}" rx="2">
      <title>Vecka ${isoWeekNum(w.wk)}, ${weekSpanLabel(w.wk)}: ${nf(val,dec)} ${unitLabelHtml}</title>
    </rect>
    <text x="${(x+barW/2).toFixed(1)}" y="${labelY.toFixed(1)}" class="hk-vallabel">${nf(val,dec)}</text>`;
  }).join('');

  const spentByWeek=bars.map(w=>({wk:w.wk,earned:w.beers,spent:consumedInWeek(w.wk)}));
  const maxEs=Math.max(1,...spentByWeek.flatMap(w=>[w.earned,w.spent]));
  const barW2=(barW-3)/2;
  const esRects=spentByWeek.map((w,i)=>{
    const gx=i*(barW+gap);
    const eh=Math.max(2,chartH*(w.earned/maxEs)),ey=baseline-eh;
    const sh=Math.max(2,chartH*(w.spent/maxEs)),sy=baseline-sh;
    return `<rect class="es-earn" x="${gx.toFixed(1)}" y="${ey.toFixed(1)}" width="${barW2.toFixed(1)}" height="${eh.toFixed(1)}" rx="1.5"><title>Vecka ${isoWeekNum(w.wk)}: intjänat ${nf(w.earned,1)} ${esc(u)}</title></rect>
      <rect class="es-spend" x="${(gx+barW2+3).toFixed(1)}" y="${sy.toFixed(1)}" width="${barW2.toFixed(1)}" height="${sh.toFixed(1)}" rx="1.5"><title>Vecka ${isoWeekNum(w.wk)}: spenderat ${nf(w.spent,1)} ${esc(u)}</title></rect>`;
  }).join('');

  const listRows=list.map(w=>`
    <div class="led-row">
      <span class="l">Vecka ${isoWeekNum(w.wk)} · ${weekSpanLabel(w.wk)}</span>
      <span class="r" style="display:flex;align-items:center;gap:8px">
        <span class="mono">${nf(w.km,1)} km</span>
        <span class="mono" style="color:var(--mut)">${w.runs} pass</span>
        <span class="mono" style="color:var(--amber)">${nf(w.beers,1)} ${esc(u)}</span>
        <span class="dot-sm ${w.status==='met'?'on':w.status==='pending'?'pending':''}"></span>
      </span>
    </div>`).join('');

  $('#v-historik').innerHTML=`
    <div class="sec-title">Historik</div>
    <div class="grid">
      <div class="stat"><div class="k c-amber">Nuvarande streak</div><div class="v c-amber">${D.streak}<span class="u"> v</span></div></div>
      <div class="stat"><div class="k c-green">Längsta streak</div><div class="v c-green">${longestStreakEver()}<span class="u"> v</span></div></div>
      <div class="stat"><div class="k c-cyan">Antal pass</div><div class="v c-cyan">${D.totalRuns}</div></div>
      <div class="stat"><div class="k c-purple">Total distans</div><div class="v c-purple">${nf(D.totalKm,1)}<span class="u"> km</span></div></div>
    </div>
    <div class="seg" id="hist-seg">
      <button data-m="km" class="${historikMetric==='km'?'active':''}">Km</button>
      <button data-m="kcal" class="${historikMetric==='kcal'?'active':''}">Kcal</button>
      <button data-m="ol" class="${historikMetric==='ol'?'active':''}">${esc(u)}</button>
    </div>
    <svg id="hist-chart" viewBox="0 0 300 120" style="width:100%;height:120px;display:block;margin-top:14px;overflow:visible">${grid(maxVal,dec)}${rects}</svg>
    <div class="week-need" id="hist-readout">Tryck på en stapel för att se veckans värde.</div>

    <div class="sec-title">Intjänat vs spenderat</div>
    <div class="hk-legend">
      <span><i style="background:var(--green)"></i>Intjänat</span>
      <span><i style="background:var(--red)"></i>Spenderat</span>
    </div>
    <svg viewBox="0 0 300 120" style="width:100%;height:120px;display:block;margin-top:8px;overflow:visible">${grid(maxEs,1)}${esRects}</svg>

    <div class="sec-title">Per vecka</div>
    <div class="ledger">${listRows}</div>
  `;

  document.querySelectorAll('#hist-seg button').forEach(b=>b.onclick=()=>{historikMetric=b.dataset.m;renderHistorik()});
  $('#hist-chart').onclick=e=>{
    const rect=e.target.closest('.hk-bar');if(!rect)return;
    document.querySelectorAll('.hk-bar').forEach(r=>r.classList.remove('hk-sel'));
    rect.classList.add('hk-sel');
    const w=bars[+rect.dataset.i];const val=metricValue(w,historikMetric);
    $('#hist-readout').textContent=`Vecka ${isoWeekNum(w.wk)}, ${weekSpanLabel(w.wk)}: ${nf(val,dec)} ${unitLabel}`;
  };
}

const FALLBACK_TZS=['Europe/Stockholm','Europe/Helsinki','Europe/Oslo','Europe/Copenhagen','Europe/London','Europe/Berlin','UTC'];
function tzList(){
  try{const l=Intl.supportedValuesOf('timeZone');if(l&&l.length)return l}catch(e){}
  return Array.from(new Set([...FALLBACK_TZS,DEFAULT_TZ]));
}

    <div class="tab-card" style="display:block;padding:18px">
      <p style="color:var(--mut);font-size:12px;line-height:1.5;margin-bottom:14px">
        Exportera all din data till en fil, eller återställ från en tidigare backup.
      </p>
      <div class="modal-actions" style="margin-top:0">
        <button class="btn btn-ghost" id="bak-export-btn">Exportera data</button>
        <button class="btn btn-ghost" id="bak-import-btn">Importera data</button>
      </div>
    </div>

    <button class="danger" id="s-reset">Nollställ all data</button>
    <button class="btn btn-ghost" id="go-om" style="width:100%;margin-top:10px">Om Galopp</button>
  `;
  $('#go-om').onclick=()=>go('om');
  document.querySelectorAll('.dprofile').forEach(el=>el.onclick=async e=>{
    if(e.target.closest('[data-edit-drink]'))return;
    S.settings.activeDrinkId=el.dataset.drink;
    syncActiveDrink();
    await save();renderInstallningar();
  });
  document.querySelectorAll('[data-edit-drink]').forEach(b=>b.onclick=e=>{e.stopPropagation();editDrinkProfile(b.dataset.editDrink)});
  $('#add-drink').onclick=()=>editDrinkProfile(null);
  $('#s-save').onclick=async()=>{
    S.settings.needPerWeek=Math.max(1,parseInt($('#s-need').value)||1);
    S.settings.penaltyBeer=Math.max(0,parseFloat($('#s-pen').value)||0);
    S.settings.bankCap=Math.max(0,parseFloat($('#s-cap').value)||0);
    S.settings.timezone=$('#s-tz').value||DEFAULT_TZ;
    await save();flash($('#s-save'),'Sparat ✓');renderInstallningar();
  };
  $('#bak-export-btn').onclick=openBackupExportModal;
  $('#bak-import-btn').onclick=openBackupImportModal;
  $('#s-reset').onclick=()=>{
    openModal(`<h3>Nollställa?</h3><p style="color:var(--mut);font-size:14px;line-height:1.5;margin-bottom:18px">Detta raderar alla pass, mål och inställningar. Går inte att ångra.</p>
      <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Avbryt</button><button class="btn" style="background:var(--red);color:#fff" id="do-reset">Radera allt</button></div>`);
    $('#do-reset').onclick=async()=>{S=JSON.parse(JSON.stringify(DEFAULTS));ensureDrinkProfiles();ensureAchievementClaims();await save();closeModal();go('oversikt')};
  };
}

// ---------- dryckesprofil-editor ----------
function editDrinkProfile(id){
  const isNew=!id;
  const d=id?S.settings.drinkProfiles.find(x=>x.id===id):{icon:'🍺',label:'',kcalPerUnit:250};
  const icons=['🍺','🥃','🍷','🧃','☕','🥤','🍹','🧉'];
  const iconBtns=icons.map(ic=>`<button type="button" class="ic-pick" data-ic="${ic}" style="font-size:22px;padding:8px;border-radius:10px;border:1px solid ${d.icon===ic?'var(--amber)':'var(--line)'};background:${d.icon===ic?'rgba(245,166,35,.12)':'var(--bg2)'}">${ic}</button>`).join('');
  openModal(`
    <h3>${isNew?'Ny dryck':'Redigera dryck'}</h3>
    <div class="field"><label>Ikon</label><div style="display:flex;gap:6px;flex-wrap:wrap" id="dp-ic-row">${iconBtns}</div></div>
    <div class="field"><label style="display:flex;justify-content:space-between">${charCountLabel('Namn',20)}</label><input type="text" id="dp-label" value="${esc(d.label)}" placeholder="t.ex. Cider" maxlength="20"></div>
    <div class="field"><label>Kalorier per enhet</label><input type="number" id="dp-kcal" value="${d.kcalPerUnit}" inputmode="decimal" step="any"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Avbryt</button>
      <button class="btn btn-amber" id="dp-save">Spara</button>
    </div>
    ${!isNew&&S.settings.drinkProfiles.length>1?'<button class="danger" id="dp-del">Ta bort dryck</button>':''}
  `);
  let chosen=d.icon;
  document.querySelectorAll('#dp-ic-row .ic-pick').forEach(b=>b.onclick=()=>{chosen=b.dataset.ic;
    document.querySelectorAll('#dp-ic-row .ic-pick').forEach(x=>{x.style.borderColor='var(--line)';x.style.background='var(--bg2)'});
    b.style.borderColor='var(--amber)';b.style.background='rgba(245,166,35,.12)'});
  wireCharCount('dp-label');
  $('#dp-save').onclick=async()=>{
    const label=$('#dp-label').value.trim()||'Dryck';
    const kcalPerUnit=Math.max(1,parseFloat(($('#dp-kcal').value||'0').replace(',','.'))||250);
    const obj={id:id||uid(),icon:chosen,label,kcalPerUnit};
    if(id)S.settings.drinkProfiles=S.settings.drinkProfiles.map(x=>x.id===id?obj:x);
    else{S.settings.drinkProfiles.push(obj);S.settings.activeDrinkId=obj.id}
    syncActiveDrink();
    await save();closeModal();renderInstallningar();
  };
  if(!isNew&&S.settings.drinkProfiles.length>1)$('#dp-del').onclick=async()=>{
    S.settings.drinkProfiles=S.settings.drinkProfiles.filter(x=>x.id!==id);
    if(S.settings.activeDrinkId===id)S.settings.activeDrinkId=S.settings.drinkProfiles[0].id;
    syncActiveDrink();
    await save();closeModal();renderInstallningar();
  };
}

// ---------- om ----------
function renderOm(){
  $('#v-om').innerHTML=`
    <div class="sec-title">Om Galopp</div>
    <div class="tab-card" style="display:block;padding:20px">
      <div class="brand" style="margin-bottom:14px">GAL<b>OPP</b></div>
      <p style="margin-bottom:12px">
        En galopp är krogslang för en liten öl — serveras traditionellt i ett vinglas,
        ungefär 12,5 centiliter. Rätt storlek för den som är på språng och inte har tid
        med en hel stor.
      </p>
      <p style="margin-bottom:12px">
        Ordet kommer från franskans <i>galopin</i>, som ursprungligen syftade på
        springpojkar. Förr i tiden fick springpojkarna i Frankrike ofta en liten öl
        som tack när de sprang ärenden mellan olika ställen — och därifrån kommer
        kopplingen mellan att galoppera runt och att bli belönad med en öl.
      </p>
      <p style="margin-bottom:0">
        Det är exakt vad den här appen handlar om: du springer, du tjänar en öl.
        Namnet kändes för passande för att inte använda.
      </p>
    </div>
    <button class="btn btn-ghost" id="om-back" style="width:100%;margin-top:16px">Tillbaka till Inställningar</button>
  `;
  $('#om-back').onclick=()=>go('installningar');
}

// ---------- achievement editor ----------
function editAch(id){
  const a=id?S.achievements.find(x=>x.id===id):{icon:'🎯',name:'',cond:'run_km',threshold:5,reward:'',repeatable:false};
  const opts=Object.entries(CONDS).map(([k,v])=>`<option value="${k}" ${a.cond===k?'selected':''}>${v.label} (${v.unit})</option>`).join('');
  const icons=['🍺','🥃','🍷','🎯','🔥','🏆','⭐','🏅','🚀','🍾'];
  const iconBtns=icons.map(ic=>`<button type="button" class="ic-pick" data-ic="${ic}" style="font-size:22px;padding:8px;border-radius:10px;border:1px solid ${a.icon===ic?'var(--amber)':'var(--line)'};background:${a.icon===ic?'rgba(245,166,35,.12)':'var(--bg2)'}">${ic}</button>`).join('');
  openModal(`
    <h3>${id?'Redigera mål':'Nytt mål'}</h3>
    <div class="field"><label>Ikon</label><div style="display:flex;gap:6px;flex-wrap:wrap" id="ic-row">${iconBtns}</div></div>
    <div class="field"><label style="display:flex;justify-content:space-between">${charCountLabel('Namn',20)}</label><input type="text" id="a-name" value="${esc(a.name)}" placeholder="t.ex. Whiskyglas" maxlength="20"></div>
    <div class="field"><label style="display:flex;justify-content:space-between">${charCountLabel('Belöning',80)}</label><input type="text" id="a-reward" value="${esc(a.reward)}" placeholder="t.ex. 1 glas whisky" maxlength="80"></div>
    <div class="two">
      <div class="field"><label>Villkor</label><select id="a-cond">${opts}</select></div>
      <div class="field"><label>Tröskel</label><input type="number" id="a-th" value="${a.threshold}" inputmode="decimal" step="any"></div>
    </div>
    <label style="display:flex;align-items:center;gap:10px;font-size:14px;color:var(--mut);margin-bottom:18px;cursor:pointer">
      <input type="checkbox" id="a-rep" ${a.repeatable?'checked':''} style="width:18px;height:18px;accent-color:var(--amber)"> Repeterbart (låses upp varje gång, t.ex. per pass)
    </label>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Avbryt</button>
      <button class="btn btn-amber" id="a-save">Spara</button>
    </div>
    ${id?'<button class="danger" id="a-del">Ta bort mål</button>':''}
  `);
  let chosen=a.icon;
  document.querySelectorAll('.ic-pick').forEach(b=>b.onclick=()=>{chosen=b.dataset.ic;
    document.querySelectorAll('.ic-pick').forEach(x=>{x.style.borderColor='var(--line)';x.style.background='var(--bg2)'});
    b.style.borderColor='var(--amber)';b.style.background='rgba(245,166,35,.12)'});
  wireCharCount('a-name');wireCharCount('a-reward');
  $('#a-save').onclick=async()=>{
    const name=$('#a-name').value.trim()||'Mål';
    const obj={id:id||uid(),icon:chosen,name,reward:$('#a-reward').value.trim()||'Belöning',
      cond:$('#a-cond').value,threshold:parseFloat(($('#a-th').value||'0').replace(',','.'))||0,repeatable:$('#a-rep').checked,
      claimedCount:id?(a.claimedCount||0):0};
    if(id)S.achievements=S.achievements.map(x=>x.id===id?obj:x);else S.achievements.push(obj);
    await save();closeModal();renderMal();
  };
  if(id)$('#a-del').onclick=async()=>{S.achievements=S.achievements.filter(x=>x.id!==id);await save();closeModal();renderMal()};
}

// ---------- helpers ----------
function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function charCountLabel(text,max){return `<span>${text}</span><span class="charcount" data-max="${max}">0/${max}</span>`}
function wireCharCount(inputId){
  const input=$('#'+inputId);if(!input)return;
  const counter=input.closest('.field')?.querySelector('.charcount');if(!counter)return;
  const max=+counter.dataset.max;
  const update=()=>counter.textContent=input.value.length+'/'+max;
  input.oninput=update;update();
}
function openModal(html){$('#modal').innerHTML=html;$('#lb-scrim')?.classList.add('show')}
function closeModal(){$('#lb-scrim')?.classList.remove('show')}
$('#lb-scrim')?.addEventListener('click',e=>{if(e.target.id==='lb-scrim')closeModal()});
function flash(btn,txt){const o=btn.textContent;btn.textContent=txt;setTimeout(()=>btn.textContent=o,1200)}
async function save(){await store.set(S)}

const RENDER={oversikt:renderOversikt,logga:renderLogga,mal:renderMal,historik:renderHistorik,installningar:renderInstallningar,om:renderOm};
function go(tab){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  $('#v-'+tab).classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  RENDER[tab]();
  window.scrollTo(0,0);
}
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>go(b.dataset.tab));

// ---------- boot ----------
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
(async()=>{
  const saved=await store.get();
  S=saved||JSON.parse(JSON.stringify(DEFAULTS));
  // migrera nya nycklar om gammal data saknar dem
  S.settings=Object.assign({},DEFAULTS.settings,S.settings);
  S.consumed=normalizeConsumed(S.consumed);
  ensureDrinkProfiles();
  ensureAchievementClaims();
  renderOversikt();
})();
</script>
